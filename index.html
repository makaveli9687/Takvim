<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c; --surface: #141414; --surface2: #1a1a1a;
    --border: #222; --border2: #2a2a2a;
    --text: #e0e0e0; --text-dim: #555; --text-mid: #888;
    --accent: #c8b8a2; --today: #2a2520; --today-border: #4a3f35;
    --green: #4caf7d; --red: #e05c5c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 12px 48px; }
  .app { width: 100%; max-width: 460px; }

  /* LOGIN */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 24px; text-align: center; }
  .login-title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
  .login-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
  .google-btn { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border2); color: var(--text); border-radius: 12px; padding: 12px 24px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; transition: border-color 0.15s, background 0.15s; letter-spacing: 0.05em; }
  .google-btn:hover { border-color: var(--text-mid); background: var(--surface2); }
  .google-icon { width: 18px; height: 18px; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .header-center { text-align: center; }
  .month-name { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
  .year-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.25em; margin-top: 4px; }
  .nav-btn { background: none; border: 1px solid var(--border2); color: var(--text-mid); width: 40px; height: 40px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s; }
  .nav-btn:hover { border-color: var(--text-mid); color: var(--text); }
  .signout-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: color 0.15s; }
  .signout-btn:hover { color: var(--text-mid); }

  /* CALENDAR */
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 6px; }
  .day-header-cell { text-align: center; font-size: 9px; color: var(--text-dim); letter-spacing: 0.15em; padding: 4px 0; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-cell { aspect-ratio: 1; border-radius: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: background 0.12s; }
  .cal-cell.active { background: var(--surface); border: 1px solid var(--border); cursor: pointer; }
  .cal-cell.active:hover { background: var(--surface2); border-color: var(--border2); }
  .cal-cell.today { background: var(--today); border: 1px solid var(--today-border) !important; }
  .day-num { font-size: 13px; color: #aaa; font-weight: 500; line-height: 1; }
  .cal-cell.today .day-num { color: var(--accent); }
  .entry-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-mid); }
  .pnl-label { font-size: 8px; font-weight: 600; letter-spacing: 0.02em; line-height: 1; }
  .pnl-label.pos { color: var(--green); }
  .pnl-label.neg { color: var(--red); }

  /* SUMMARY TOGGLE BTN */
  .summary-toggle-btn { background: none; border: 1px solid var(--border2); color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 8px 20px; border-radius: 10px; cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-top: 20px; width: 100%; }
  .summary-toggle-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }

  /* MONTH SUMMARY CARD */
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .month-summary { margin-top: 12px; border-radius: 14px; border: 1px solid var(--border2); background: var(--surface); overflow: hidden; }

  .sum-row { display: grid; border-bottom: 1px solid var(--border2); }
  .sum-row.cols3 { grid-template-columns: 1fr 1px 1fr 1px 1fr; }
  .sum-row.cols2 { grid-template-columns: 1fr 1px 1fr; }
  .sum-row.cols4 { grid-template-columns: 1fr 1px 1fr 1px 1fr 1px 1fr; }
  .sum-row.no-border { border-bottom: none; }
  .sum-divider { background: var(--border2); }
  .sum-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 6px; }
  .sum-label { font-size: 8px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
  .sum-value { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.02em; line-height: 1; color: var(--text-mid); }
  .sum-value.pos { color: var(--green); }
  .sum-value.neg { color: var(--red); }
  .sum-value.lg { font-size: 14px; }
  .summary-bar-wrap { height: 3px; background: var(--border); overflow: hidden; }
  .summary-bar { height: 100%; transition: width 0.5s cubic-bezier(.22,1,.36,1), background 0.3s; }

  /* PAIR LIST */
  .pair-list-wrap { border-top: 1px solid var(--border2); padding: 10px 12px; max-height: 140px; overflow-y: auto; }
  .pair-list-title { font-size: 8px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .pair-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .pair-row:last-child { border-bottom: none; }
  .pair-name { font-size: 12px; color: var(--text); }
  .pair-stats { display: flex; gap: 10px; align-items: center; }
  .pair-count { font-size: 11px; color: var(--text-mid); }
  .pair-tp { font-size: 10px; color: var(--green); }
  .pair-sl { font-size: 10px; color: var(--red); }

  /* OVERLAY & MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: flex-end; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; width: 100%; max-width: 460px; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-height: 88vh; overflow-y: auto; animation: slideUp 0.22s cubic-bezier(.22,1,.36,1); }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; line-height: 1; padding: 0 4px; }

  /* PHOTOS */
  .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .photo-wrap { position: relative; width: 76px; height: 76px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .remove-photo { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.75); border: none; color: #ccc; font-size: 13px; width: 20px; height: 20px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* VIEWER */
  .viewer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; }
  .viewer-overlay.open { display: flex; }
  .viewer-img { max-width: 100vw; max-height: 100vh; object-fit: contain; }
  .viewer-close { position: fixed; top: 16px; right: 16px; background: #000; border: none; color: #fff; font-size: 20px; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .viewer-download { position: fixed; top: 16px; left: 16px; background: #000; border: none; color: #fff; font-size: 18px; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }

  .add-photo-label { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px dashed var(--border2); color: var(--text-dim); border-radius: 9px; padding: 8px 14px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .add-photo-label:hover { border-color: var(--text-mid); color: var(--text-mid); }
  .add-photo-label input { display: none; }

  textarea { background: #111; border: 1px solid var(--border); border-radius: 12px; color: #ddd; font-size: 12px; font-family: 'Trebuchet MS', sans-serif; line-height: 1.8; padding: 16px; resize: none; outline: none; width: 100%; min-height: 100px; transition: border-color 0.15s; }
  textarea:focus { border-color: #3a3a3a; }
  textarea::placeholder { color: #333; font-style: italic; }

  .section-title { font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }

  /* TRADE FORM */
  .trade-form { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .trade-form-row { display: flex; gap: 6px; }
  .trade-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 12px; font-family: 'DM Mono', monospace; padding: 8px 10px; outline: none; width: 100%; transition: border-color 0.15s; }
  .trade-input:focus { border-color: var(--text-mid); }
  .trade-input::placeholder { color: var(--text-dim); }

  /* toggle buttons: long/short & tp/sl */
  .toggle-btn { flex: 1; background: none; border: 1px solid var(--border2); color: var(--text-dim); border-radius: 8px; padding: 8px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .toggle-btn.long.active  { border-color: #2a4a35; color: var(--green); background: rgba(76,175,125,0.08); }
  .toggle-btn.short.active { border-color: #4a2a2a; color: var(--red);   background: rgba(224,92,92,0.08); }
  .toggle-btn.tp.active    { border-color: #2a4a35; color: var(--green); background: rgba(76,175,125,0.08); }
  .toggle-btn.sl.active    { border-color: #4a2a2a; color: var(--red);   background: rgba(224,92,92,0.08); }

  .add-trade-btn { background: none; border: 1px dashed var(--border2); color: var(--text-dim); border-radius: 8px; padding: 8px; font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: border-color 0.15s, color 0.15s; width: 100%; }
  .add-trade-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }

  /* TRADE LIST */
  .trade-list { display: flex; flex-direction: column; gap: 6px; }
  .trade-card { background: #111; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .trade-card-left { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .trade-card-pair { font-size: 12px; color: var(--text); font-weight: 500; }
  .trade-card-meta { font-size: 10px; color: var(--text-dim); }
  .trade-card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .trade-card-rr { font-size: 12px; font-weight: 500; }
  .trade-card-rr.pos { color: var(--green); }
  .trade-card-rr.neg { color: var(--red); }
  .trade-card-dollar { font-size: 11px; font-weight: 500; }
  .trade-card-dollar.pos { color: var(--green); }
  .trade-card-dollar.neg { color: var(--red); }
  .trade-card-badge { font-size: 9px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 5px; }
  .trade-card-badge.long  { color: var(--green); background: rgba(76,175,125,0.12); }
  .trade-card-badge.short { color: var(--red);   background: rgba(224,92,92,0.12); }
  .trade-card-badge.tp    { color: var(--green); background: rgba(76,175,125,0.12); }
  .trade-card-badge.sl    { color: var(--red);   background: rgba(224,92,92,0.12); }
  .trade-remove-btn { background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; line-height: 1; }
  .trade-remove-btn:hover { color: var(--red); }

  .status { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-align: right; min-height: 16px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <div id="loginScreen" style="display:none">
    <div class="login-screen">
      <div>
        <div class="login-title">Takvim</div>
        <div class="login-sub" style="margin-top:8px">kişisel not &amp; fotoğraf takvimi</div>
      </div>
      <button class="google-btn" id="googleSignInBtn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google ile giriş yap
      </button>
      <div id="loginError" style="font-size:11px; color:#e05c5c; display:none;"></div>
    </div>
  </div>

  <div id="calendarScreen" style="display:none">
    <div class="header">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="header-center">
        <div class="month-name" id="monthName"></div>
        <div class="year-label" id="yearLabel"></div>
      </div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div style="text-align:right; margin-bottom:16px; margin-top:-16px;">
      <button class="signout-btn" id="signOutBtn">çıkış yap</button>
    </div>
    <div class="day-headers" id="dayHeaders"></div>
    <div class="calendar-grid" id="calGrid"></div>

    <button class="summary-toggle-btn" id="summaryToggleBtn">ay özeti göster</button>
    <div class="month-summary" id="monthSummary" style="display:none">

      <!-- Row 1: Kâr / Net / Zarar -->
      <div class="sum-row cols3">
        <div class="sum-col"><span class="sum-label">Kâr</span><span class="sum-value pos lg" id="sumProfit">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Net</span><span class="sum-value lg" id="sumNet">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Zarar</span><span class="sum-value neg lg" id="sumLoss">—</span></div>
      </div>
      <div class="summary-bar-wrap"><div class="summary-bar" id="summaryBar" style="width:0%"></div></div>

      <!-- Row 2: İşlem / Win% / Ort RR -->
      <div class="sum-row cols3">
        <div class="sum-col"><span class="sum-label">İşlem</span><span class="sum-value" id="statTotal">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Win%</span><span class="sum-value" id="statWinRate">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Ort RR</span><span class="sum-value" id="statAvgRR">—</span></div>
      </div>

      <!-- Row 3: Long (TP/SL) / Short (TP/SL) -->
      <div class="sum-row cols2">
        <div class="sum-col">
          <span class="sum-label">Long</span>
          <span class="sum-value pos" id="statLong">—</span>
          <span class="sum-label" id="statLongDetail" style="color:var(--text-dim); font-size:9px;"></span>
        </div>
        <div class="sum-divider"></div>
        <div class="sum-col">
          <span class="sum-label">Short</span>
          <span class="sum-value neg" id="statShort">—</span>
          <span class="sum-label" id="statShortDetail" style="color:var(--text-dim); font-size:9px;"></span>
        </div>
      </div>

      <!-- Row 4: Trade $ ort -->
      <div class="sum-row cols2 no-border">
        <div class="sum-col">
          <span class="sum-label">Kârlı Trade Ort.</span>
          <span class="sum-value pos" id="statAvgWin">—</span>
        </div>
        <div class="sum-divider"></div>
        <div class="sum-col">
          <span class="sum-label">Zararlı Trade Ort.</span>
          <span class="sum-value neg" id="statAvgLoss">—</span>
        </div>
      </div>

      <!-- Pair list -->
      <div class="pair-list-wrap" id="pairListWrap" style="display:none">
        <div class="pair-list-title">Pair Dağılımı</div>
        <div id="pairList"></div>
      </div>

    </div>
  </div>
</div>

<!-- Viewer -->
<div class="viewer-overlay" id="viewerOverlay">
  <button class="viewer-close" id="viewerClose">×</button>
  <a class="viewer-download" id="viewerDownload" download="foto.jpg">⬇</a>
  <img class="viewer-img" id="viewerImg" src="" alt="">
</div>

<!-- Day Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" id="closeBtn">×</button>
    </div>

    <div class="photo-grid" id="photoGrid"></div>
    <label class="add-photo-label">+ Fotoğraf ekle<input type="file" id="fileInput" accept="image/*" multiple></label>

    <textarea id="noteArea" placeholder="Bugün ne oldu? Notunu buraya yaz..."></textarea>

    <!-- Günlük PNL -->
    <div style="display:flex; flex-direction:column; gap:8px;">
      <input type="text" inputmode="decimal" id="pnlInput" placeholder="Günlük tutar (örn: 250)"
        style="background:#111; border:1px solid #222; border-radius:10px; color:#ddd; font-size:15px; font-family:'DM Mono',monospace; padding:10px 14px; outline:none; width:100%;">
      <div style="display:flex; gap:8px;">
        <button id="karBtn" style="flex:1; background:none; border:1px solid #2a4a35; color:#4caf7d; border-radius:10px; padding:10px; font-size:13px; font-family:'DM Mono',monospace; cursor:pointer;">Kâr</button>
        <button id="zararBtn" style="flex:1; background:none; border:1px solid #4a2a2a; color:#e05c5c; border-radius:10px; padding:10px; font-size:13px; font-family:'DM Mono',monospace; cursor:pointer;">Zarar</button>
      </div>
    </div>

    <!-- Tradeler -->
    <div>
      <div class="section-title">Tradeler</div>
      <div class="trade-list" id="tradeList"></div>
      <div class="trade-form">
        <!-- Pair + TF -->
        <div class="trade-form-row">
          <input class="trade-input" id="tPair" placeholder="Pair (ör: EURUSD)" style="flex:2">
          <input class="trade-input" id="tTF" placeholder="TF (ör: 15m)" style="flex:1">
        </div>
        <!-- Long / Short -->
        <div class="trade-form-row">
          <button class="toggle-btn long active" id="tLongBtn">Long</button>
          <button class="toggle-btn short" id="tShortBtn">Short</button>
        </div>
        <!-- TP / SL sonuç -->
        <div class="trade-form-row">
          <button class="toggle-btn tp" id="tTPBtn">TP ✓</button>
          <button class="toggle-btn sl" id="tSLBtn">SL ✗</button>
        </div>
        <!-- RR + $ tutar -->
        <div class="trade-form-row">
          <input class="trade-input" id="tRR" placeholder="RR (ör: 2.5)">
          <input class="trade-input" id="tDollar" placeholder="$ Tutar (ör: 100)" inputmode="decimal">
        </div>
        <button class="add-trade-btn" id="addTradeBtn">+ Trade ekle</button>
      </div>
    </div>

    <div class="status" id="statusMsg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXIDM95RlrYzLcrsoRhIU6M99O35uOkN8",
  authDomain: "trade-takvimi.firebaseapp.com",
  projectId: "trade-takvimi",
  storageBucket: "trade-takvimi.firebasestorage.app",
  messagingSenderId: "277386285934",
  appId: "1:277386285934:web:71721232cac09f3764677f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const DAYS = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];

const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();
let selectedDay = null;
let currentUser = null;
let saveTimer = null;
let dotCache = {};
let tradeDir = "long";   // long | short
let tradeResult = null;  // null | "tp" | "sl"

function showScreen(name) {
  document.getElementById("loginScreen").style.display = name === "login" ? "block" : "none";
  document.getElementById("calendarScreen").style.display = name === "calendar" ? "block" : "none";
}
function setStatus(msg) { document.getElementById("statusMsg").textContent = msg; }

onAuthStateChanged(auth, (user) => {
  if (user) { currentUser = user; dotCache = {}; showScreen("calendar"); render(); }
  else { currentUser = null; showScreen("login"); }
});

document.getElementById("googleSignInBtn").addEventListener("click", async () => {
  const errEl = document.getElementById("loginError"); errEl.style.display = "none";
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { errEl.textContent = "Giriş başarısız: " + e.message; errEl.style.display = "block"; }
});
document.getElementById("signOutBtn").addEventListener("click", () => signOut(auth));

function entryRef(y, m, d) { return doc(db, "users", currentUser.uid, "entries", `${y}_${m}_${d}`); }

async function loadEntry(y, m, d) {
  try {
    const snap = await getDoc(entryRef(y, m, d));
    const data = snap.exists() ? snap.data() : {};
    return { note: data.note || "", photos: data.photos || [], pnl: data.pnl || "", trades: data.trades || [] };
  } catch(e) { console.error(e); return { note: "", photos: [], pnl: "", trades: [] }; }
}

async function saveEntry(y, m, d, data) {
  try {
    await setDoc(entryRef(y, m, d), data);
    dotCache[`${y}_${m}_${d}`] = data.note.trim() !== "" || data.photos.length > 0 || data.pnl !== "" || data.trades.length > 0;
  } catch(e) { console.error(e); setStatus("kaydetme hatası!"); }
}

async function checkDot(y, m, d) {
  const key = `${y}_${m}_${d}`;
  if (dotCache[key] !== undefined) return dotCache[key];
  const e = await loadEntry(y, m, d);
  dotCache[key] = e.note.trim() !== "" || e.photos.length > 0 || e.pnl !== "" || e.trades.length > 0;
  return dotCache[key];
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function firstDay(y, m) { let d = new Date(y,m,1).getDay(); return d===0?6:d-1; }

// ── MONTHLY SUMMARY ──
async function updateMonthlySummary(y, m) {
  const days = daysInMonth(y, m);
  const entries = await Promise.all(Array.from({length: days}, (_, i) => loadEntry(y, m, i+1)));

  let totalProfit = 0, totalLoss = 0;
  let allTrades = [];
  let longTotal = 0, longTP = 0, longSL = 0;
  let shortTotal = 0, shortTP = 0, shortSL = 0;
  let rrValues = [], winCount = 0;
  let dollarWins = [], dollarLosses = [];

  entries.forEach(e => {
    if (e.pnl && e.pnl !== "") {
      const val = parseFloat(e.pnl);
      if (!isNaN(val)) { if (val > 0) totalProfit += val; else totalLoss += val; }
    }
    (e.trades || []).forEach(t => {
      // Only count trades with a result (tp or sl)
      if (!t.result) return;
      allTrades.push(t);

      const isTP = t.result === "tp";
      if (t.dir === "long") {
        longTotal++;
        if (isTP) longTP++; else longSL++;
      } else {
        shortTotal++;
        if (isTP) shortTP++; else shortSL++;
      }

      if (isTP) winCount++;

      const rr = parseFloat(t.rr);
      if (!isNaN(rr)) rrValues.push(isTP ? rr : -rr);

      const dollar = parseFloat(t.dollar);
      if (!isNaN(dollar) && dollar > 0) {
        if (isTP) dollarWins.push(dollar);
        else dollarLosses.push(dollar);
      }
    });
  });

  const net = totalProfit + totalLoss;
  const hasData = totalProfit !== 0 || totalLoss !== 0 || allTrades.length > 0;
  const summaryEl = document.getElementById("monthSummary");

  if (!hasData) {
    summaryEl.style.display = "none";
    document.getElementById("summaryToggleBtn").textContent = "ay özeti göster";
    return;
  }

  summaryEl.style.display = "block";
  summaryEl.style.animation = "none"; summaryEl.offsetHeight; summaryEl.style.animation = "fadeIn 0.3s ease";

  // PNL row
  document.getElementById("sumProfit").textContent = totalProfit > 0 ? `+${totalProfit.toFixed(0)}$` : "—";
  document.getElementById("sumLoss").textContent   = totalLoss < 0 ? `${totalLoss.toFixed(0)}$` : "—";
  const netEl = document.getElementById("sumNet");
  netEl.textContent = (net >= 0 ? "+" : "") + net.toFixed(0) + "$";
  netEl.className = "sum-value lg " + (net > 0 ? "pos" : net < 0 ? "neg" : "");
  const absTotalLoss = Math.abs(totalLoss);
  const ratio = totalProfit + absTotalLoss > 0 ? (totalProfit / (totalProfit + absTotalLoss)) * 100 : 50;
  document.getElementById("summaryBar").style.width = ratio + "%";
  document.getElementById("summaryBar").style.background = net >= 0 ? "var(--green)" : "var(--red)";

  // Stats row
  const total = allTrades.length;
  const winRate = total > 0 ? Math.round((winCount / total) * 100) : null;
  const avgRR = rrValues.length > 0 ? rrValues.reduce((a,b)=>a+b,0)/rrValues.length : null;

  document.getElementById("statTotal").textContent = total > 0 ? total : "—";

  const wrEl = document.getElementById("statWinRate");
  wrEl.textContent = winRate !== null ? winRate + "%" : "—";
  wrEl.className = "sum-value" + (winRate !== null ? (winRate >= 50 ? " pos" : " neg") : "");

  const avgRREl = document.getElementById("statAvgRR");
  avgRREl.textContent = avgRR !== null ? (avgRR >= 0 ? "+" : "") + avgRR.toFixed(2) + "R" : "—";
  avgRREl.className = "sum-value" + (avgRR !== null ? (avgRR >= 0 ? " pos" : " neg") : "");

  // Long / Short rows
  document.getElementById("statLong").textContent = longTotal > 0 ? longTotal : "—";
  document.getElementById("statLongDetail").textContent = longTotal > 0 ? `${longTP} TP  /  ${longSL} SL` : "";
  document.getElementById("statShort").textContent = shortTotal > 0 ? shortTotal : "—";
  document.getElementById("statShortDetail").textContent = shortTotal > 0 ? `${shortTP} TP  /  ${shortSL} SL` : "";

  // Dollar avg rows
  const avgWin  = dollarWins.length   > 0 ? dollarWins.reduce((a,b)=>a+b,0)   / dollarWins.length   : null;
  const avgLoss = dollarLosses.length > 0 ? dollarLosses.reduce((a,b)=>a+b,0) / dollarLosses.length : null;
  document.getElementById("statAvgWin").textContent  = avgWin  !== null ? "+" + avgWin.toFixed(0)  + "$" : "—";
  document.getElementById("statAvgLoss").textContent = avgLoss !== null ? "-" + avgLoss.toFixed(0) + "$" : "—";

  // Pair distribution
  const pairMap = {};
  allTrades.forEach(t => {
    const p = (t.pair || "?").toUpperCase();
    if (!pairMap[p]) pairMap[p] = { total: 0, tp: 0, sl: 0 };
    pairMap[p].total++;
    if (t.result === "tp") pairMap[p].tp++; else pairMap[p].sl++;
  });

  const pairs = Object.entries(pairMap).sort((a,b) => b[1].total - a[1].total);
  const pairListWrap = document.getElementById("pairListWrap");
  const pairList = document.getElementById("pairList");

  if (pairs.length > 0) {
    pairListWrap.style.display = "block";
    pairList.innerHTML = "";
    pairs.forEach(([pair, data]) => {
      const row = document.createElement("div"); row.className = "pair-row";
      row.innerHTML = `
        <span class="pair-name">${pair}</span>
        <div class="pair-stats">
          <span class="pair-count">${data.total} işlem</span>
          <span class="pair-tp">TP ${data.tp}</span>
          <span class="pair-sl">SL ${data.sl}</span>
        </div>`;
      pairList.appendChild(row);
    });
  } else {
    pairListWrap.style.display = "none";
  }
}

// ── RENDER CALENDAR ──
async function render() {
  document.getElementById("monthName").textContent = MONTHS[curMonth];
  document.getElementById("yearLabel").textContent = curYear;
  document.getElementById("dayHeaders").innerHTML = DAYS.map(d=>`<div class="day-header-cell">${d}</div>`).join("");
  document.getElementById("monthSummary").style.display = "none";
  document.getElementById("summaryToggleBtn").textContent = "ay özeti göster";

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  const days = daysInMonth(curYear, curMonth);
  const first = firstDay(curYear, curMonth);
  const cells = Math.ceil((first + days) / 7) * 7;

  for (let i = 0; i < cells; i++) {
    const day = i - first + 1;
    const cell = document.createElement("div"); cell.className = "cal-cell";
    if (day >= 1 && day <= days) {
      cell.classList.add("active");
      if (day===today.getDate() && curMonth===today.getMonth() && curYear===today.getFullYear()) cell.classList.add("today");

      const num = document.createElement("span"); num.className = "day-num"; num.textContent = day; cell.appendChild(num);
      const dot = document.createElement("span"); dot.className = "entry-dot"; dot.style.visibility = "hidden"; cell.appendChild(dot);
      const pnlEl = document.createElement("span"); pnlEl.className = "pnl-label"; pnlEl.style.visibility = "hidden"; cell.appendChild(pnlEl);

      checkDot(curYear, curMonth, day).then(has => { if (has) dot.style.visibility = "visible"; });
      loadEntry(curYear, curMonth, day).then(entry => {
        if (entry.pnl && entry.pnl !== "") {
          const val = parseFloat(entry.pnl);
          if (!isNaN(val)) {
            pnlEl.textContent = (val >= 0 ? "+" : "") + val + "$";
            pnlEl.classList.add(val >= 0 ? "pos" : "neg");
            pnlEl.style.visibility = "visible";
            dot.style.visibility = "hidden";
          }
        }
      });
      cell.addEventListener("click", () => openModal(day));
    }
    grid.appendChild(cell);
  }
}

// ── SUMMARY TOGGLE ──
document.getElementById("summaryToggleBtn").addEventListener("click", async () => {
  const summaryEl = document.getElementById("monthSummary");
  const btn = document.getElementById("summaryToggleBtn");
  if (summaryEl.style.display !== "none") {
    summaryEl.style.display = "none";
    btn.textContent = "ay özeti göster";
  } else {
    btn.textContent = "yükleniyor...";
    await updateMonthlySummary(curYear, curMonth);
    btn.textContent = "ay özetini gizle";
  }
});

// ── MODAL ──
async function openModal(day) {
  selectedDay = day;
  document.getElementById("modalTitle").textContent = `${day} ${MONTHS[curMonth]} ${curYear}`;
  document.getElementById("noteArea").value = "";
  document.getElementById("photoGrid").innerHTML = "";
  document.getElementById("tradeList").innerHTML = "";
  resetTradeForm();
  setStatus("yükleniyor...");
  document.getElementById("overlay").classList.add("open");

  const entry = await loadEntry(curYear, curMonth, day);
  document.getElementById("noteArea").value = entry.note || "";
  const pnlVal = entry.pnl || "";
  const pnlInput = document.getElementById("pnlInput");
  pnlInput.value = pnlVal;
  pnlInput.style.color = pnlVal.startsWith("+") ? "#4caf7d" : pnlVal.startsWith("-") ? "#e05c5c" : "#ddd";
  renderPhotos(entry.photos || []);
  renderTrades(entry.trades || []);
  setStatus("");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  selectedDay = null;
  render();
}

// ── TRADE FORM TOGGLES ──
function resetTradeForm() {
  document.getElementById("tPair").value = "";
  document.getElementById("tTF").value = "";
  document.getElementById("tRR").value = "";
  document.getElementById("tDollar").value = "";
  tradeDir = "long"; tradeResult = null;
  document.getElementById("tLongBtn").classList.add("active");
  document.getElementById("tShortBtn").classList.remove("active");
  document.getElementById("tTPBtn").classList.remove("active");
  document.getElementById("tSLBtn").classList.remove("active");
}

document.getElementById("tLongBtn").addEventListener("click", () => {
  tradeDir = "long";
  document.getElementById("tLongBtn").classList.add("active");
  document.getElementById("tShortBtn").classList.remove("active");
});
document.getElementById("tShortBtn").addEventListener("click", () => {
  tradeDir = "short";
  document.getElementById("tShortBtn").classList.add("active");
  document.getElementById("tLongBtn").classList.remove("active");
});
document.getElementById("tTPBtn").addEventListener("click", () => {
  tradeResult = tradeResult === "tp" ? null : "tp";
  document.getElementById("tTPBtn").classList.toggle("active", tradeResult === "tp");
  document.getElementById("tSLBtn").classList.remove("active");
  if (tradeResult === "tp") tradeResult = "tp"; // keep
});
document.getElementById("tSLBtn").addEventListener("click", () => {
  tradeResult = tradeResult === "sl" ? null : "sl";
  document.getElementById("tSLBtn").classList.toggle("active", tradeResult === "sl");
  document.getElementById("tTPBtn").classList.remove("active");
});

// ── ADD TRADE ──
document.getElementById("addTradeBtn").addEventListener("click", async () => {
  if (!selectedDay) return;
  const pair = document.getElementById("tPair").value.trim().toUpperCase();
  if (!pair) { setStatus("Pair gir!"); setTimeout(()=>setStatus(""),1500); return; }
  if (!tradeResult) { setStatus("TP mi SL mi seç!"); setTimeout(()=>setStatus(""),1500); return; }

  const rawDollar = document.getElementById("tDollar").value.replace(/[^0-9.]/g, "");
  const trade = {
    pair,
    dir: tradeDir,
    result: tradeResult,
    tf: document.getElementById("tTF").value.trim(),
    rr: document.getElementById("tRR").value.trim(),
    dollar: rawDollar || "",
    id: Date.now()
  };

  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.trades.push(trade);
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderTrades(entry.trades);
  resetTradeForm();
  setStatus("trade eklendi ✓"); setTimeout(()=>setStatus(""), 1500);
});

// ── RENDER TRADES ──
function renderTrades(trades) {
  const list = document.getElementById("tradeList");
  list.innerHTML = "";
  if (!trades || trades.length === 0) return;
  trades.forEach((t, idx) => {
    const card = document.createElement("div"); card.className = "trade-card";
    const left = document.createElement("div"); left.className = "trade-card-left";

    const pairEl = document.createElement("span"); pairEl.className = "trade-card-pair";
    pairEl.textContent = (t.pair || "—").toUpperCase();
    left.appendChild(pairEl);

    const parts = [];
    if (t.tf) parts.push(t.tf);
    if (t.rr) parts.push("RR: " + t.rr);
    if (parts.length) {
      const meta = document.createElement("span"); meta.className = "trade-card-meta";
      meta.textContent = parts.join("  ·  "); left.appendChild(meta);
    }

    const right = document.createElement("div"); right.className = "trade-card-right";

    // $ tutar
    if (t.dollar && t.dollar !== "") {
      const dolEl = document.createElement("span");
      const isWin = t.result === "tp";
      dolEl.className = "trade-card-dollar " + (isWin ? "pos" : "neg");
      dolEl.textContent = (isWin ? "+" : "-") + t.dollar + "$";
      right.appendChild(dolEl);
    }

    // Long/Short badge
    if (t.dir) {
      const dirEl = document.createElement("span");
      dirEl.className = "trade-card-badge " + t.dir;
      dirEl.textContent = t.dir === "long" ? "LONG" : "SHORT";
      right.appendChild(dirEl);
    }

    // TP/SL badge
    if (t.result) {
      const resEl = document.createElement("span");
      resEl.className = "trade-card-badge " + t.result;
      resEl.textContent = t.result === "tp" ? "TP" : "SL";
      right.appendChild(resEl);
    }

    const removeBtn = document.createElement("button"); removeBtn.className = "trade-remove-btn"; removeBtn.textContent = "×";
    removeBtn.addEventListener("click", () => removeTrade(idx));
    right.appendChild(removeBtn);

    card.appendChild(left); card.appendChild(right);
    list.appendChild(card);
  });
}

async function removeTrade(idx) {
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.trades.splice(idx, 1);
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderTrades(entry.trades);
  setStatus("silindi ✓"); setTimeout(()=>setStatus(""), 1500);
}

// ── PHOTOS ──
function openViewer(src) { document.getElementById("viewerImg").src = src; document.getElementById("viewerDownload").href = src; document.getElementById("viewerOverlay").classList.add("open"); }
function closeViewer() { document.getElementById("viewerOverlay").classList.remove("open"); }
document.getElementById("viewerClose").addEventListener("click", closeViewer);
document.getElementById("viewerOverlay").addEventListener("click", (e) => { if (e.target===document.getElementById("viewerOverlay")) closeViewer(); });

function renderPhotos(photos) {
  const grid = document.getElementById("photoGrid"); grid.innerHTML = "";
  photos.forEach((data, idx) => {
    const wrap = document.createElement("div"); wrap.className = "photo-wrap";
    const img = document.createElement("img"); img.src = data; img.addEventListener("click", () => openViewer(data));
    const btn = document.createElement("button"); btn.className = "remove-photo"; btn.textContent = "×";
    btn.addEventListener("click", (e) => { e.stopPropagation(); removePhoto(idx); });
    wrap.appendChild(img); wrap.appendChild(btn); grid.appendChild(wrap);
  });
}

async function removePhoto(idx) {
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.photos.splice(idx, 1);
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderPhotos(entry.photos);
  setStatus("silindi ✓"); setTimeout(()=>setStatus(""), 1500);
}

function resizeImage(file, maxSize=1200) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = h*maxSize/w; w = maxSize; } else if (h > maxSize) { w = w*maxSize/h; h = maxSize; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/webp", 0.95));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById("fileInput").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files); if (!files.length) return;
  setStatus("fotoğraflar yükleniyor...");
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  for (const file of files) entry.photos.push(await resizeImage(file));
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderPhotos(entry.photos);
  setStatus("kaydedildi ✓"); setTimeout(()=>setStatus(""), 2000); e.target.value = "";
});

// ── NOTE ──
document.getElementById("noteArea").addEventListener("input", (e) => {
  if (!selectedDay) return;
  clearTimeout(saveTimer); setStatus("kaydediliyor...");
  saveTimer = setTimeout(async () => {
    const entry = await loadEntry(curYear, curMonth, selectedDay);
    entry.note = e.target.value;
    await saveEntry(curYear, curMonth, selectedDay, entry);
    setStatus("kaydedildi ✓"); setTimeout(()=>setStatus(""), 2000);
  }, 800);
});

// ── GÜNLÜK PNL ──
async function savePnl(value) {
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.pnl = value;
  await saveEntry(curYear, curMonth, selectedDay, entry);
  setStatus("kaydedildi ✓"); setTimeout(()=>setStatus(""), 2000);
  document.getElementById("pnlInput").style.color = value.startsWith("+") ? "#4caf7d" : value.startsWith("-") ? "#e05c5c" : "#ddd";
}

document.getElementById("karBtn").addEventListener("click", async () => {
  if (!selectedDay) return;
  const raw = document.getElementById("pnlInput").value.replace(/[^0-9.]/g, ""); if (!raw) return;
  const val = "+" + raw; document.getElementById("pnlInput").value = val; await savePnl(val);
});
document.getElementById("zararBtn").addEventListener("click", async () => {
  if (!selectedDay) return;
  const raw = document.getElementById("pnlInput").value.replace(/[^0-9.]/g, ""); if (!raw) return;
  const val = "-" + raw; document.getElementById("pnlInput").value = val; await savePnl(val);
});

// ── NAV ──
document.getElementById("prevBtn").addEventListener("click", () => { if(curMonth===0){curMonth=11;curYear--;}else curMonth--; render(); });
document.getElementById("nextBtn").addEventListener("click", () => { if(curMonth===11){curMonth=0;curYear++;}else curMonth++; render(); });
document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", (e) => { if(e.target===document.getElementById("overlay")) closeModal(); });
</script>
