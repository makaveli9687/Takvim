<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #222;
    --border2: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #555;
    --text-mid: #888;
    --accent: #c8b8a2;
    --today: #2a2520;
    --today-border: #4a3f35;
    --green: #4caf7d;
    --red: #e05c5c;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 12px 48px;
  }
  .app { width: 100%; max-width: 460px; }
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 24px;
    text-align: center;
  }
  .login-title {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .login-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
  .google-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    letter-spacing: 0.05em;
  }
  .google-btn:hover { border-color: var(--text-mid); background: var(--surface2); }
  .google-icon { width: 18px; height: 18px; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .header-center { text-align: center; }
  .month-name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .year-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.25em; margin-top: 4px; }
  .nav-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-mid);
    width: 40px; height: 40px;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover { border-color: var(--text-mid); color: var(--text); }
  .signout-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: color 0.15s;
  }
  .signout-btn:hover { color: var(--text-mid); }
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 6px;
  }
  .day-header-cell {
    text-align: center;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    padding: 4px 0;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 9px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.12s;
  }
  .cal-cell.active {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .cal-cell.active:hover { background: var(--surface2); border-color: var(--border2); }
  .cal-cell.today { background: var(--today); border: 1px solid var(--today-border) !important; }
  .day-num { font-size: 13px; color: #aaa; font-weight: 500; line-height: 1; }
  .cal-cell.today .day-num { color: var(--accent); }
  .entry-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-mid); }
  .pnl-label { font-size: 8px; font-weight: 600; letter-spacing: 0.02em; line-height: 1; }
  .pnl-label.pos { color: var(--green); }
  .pnl-label.neg { color: var(--red); }

  /* \u2500\u2500 MONTHLY SUMMARY \u2500\u2500 */
  .month-summary {
    margin-top: 20px;
    border-radius: 14px;
    border: 1px solid var(--border2);
    background: var(--surface);
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .summary-inner {
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr;
    gap: 0;
  }
  .summary-divider {
    background: var(--border2);
    align-self: stretch;
  }
  .summary-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 16px 8px;
  }
  .summary-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .summary-value {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .summary-value.pos { color: var(--green); }
  .summary-value.neg { color: var(--red); }
  .summary-value.neutral { color: var(--text-mid); }

  .summary-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 0 0 14px 14px;
    overflow: hidden;
  }
  .summary-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.22,1,.36,1), background 0.3s;
  }

  /* \u2500\u2500 OVERLAY / MODAL \u2500\u2500 */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px;
    width: 100%;
    max-width: 460px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.22s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .close-btn {
    background: none; border: none;
    color: var(--text-dim); font-size: 24px;
    cursor: pointer; line-height: 1; padding: 0 4px;
  }
  .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .photo-wrap {
    position: relative;
    width: 76px; height: 76px;
    border-radius: 9px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .remove-photo {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,0.75);
    border: none; color: #ccc;
    font-size: 13px; width: 20px; height: 20px;
    border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* FULLSCREEN VIEWER */
  .viewer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .viewer-overlay.open { display: flex; }
  .viewer-img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
  }
  .viewer-close {
    position: fixed;
    top: 16px; right: 16px;
    background: #000;
    border: none; color: #fff;
    font-size: 20px; width: 42px; height: 42px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .viewer-download {
    position: fixed;
    top: 16px; left: 16px;
    background: #000;
    border: none; color: #fff;
    font-size: 18px; width: 42px; height: 42px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .add-photo-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text-dim);
    border-radius: 9px;
    padding: 8px 14px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-photo-label:hover { border-color: var(--text-mid); color: var(--text-mid); }
  .add-photo-label input { display: none; }
  textarea {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: #ddd;
    font-size: 12px;
    font-family: 'Trebuchet MS', sans-serif;
    line-height: 1.8;
    padding: 16px;
    resize: none;
    outline: none;
    width: 100%;
    min-height: 140px;
    letter-spacing: 0.01em;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #3a3a3a; }
  textarea::placeholder { color: #333; font-style: italic; }
  .status { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-align: right; min-height: 16px; }
  .loading-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 80vh; color: var(--text-dim);
    font-size: 12px; letter-spacing: 0.15em;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <div id="loginScreen" style="display:none">
    <div class="login-screen">
      <div>
        <div class="login-title">Takvim</div>
        <div class="login-sub" style="margin-top:8px">ki\u015fisel not &amp; foto\u011fraf takvimi</div>
      </div>
      <button class="google-btn" id="googleSignInBtn">

          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google ile giri\u015f yap
      </button>
    </div>
  </div>

  <div id="calendarScreen" style="display:none">
    <div class="header">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="header-center">
        <div class="month-name" id="monthName"></div>
        <div class="year-label" id="yearLabel"></div>
      </div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div style
