<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c; --surface: #141414; --surface2: #1a1a1a;
    --border: #222; --border2: #2a2a2a;
    --text: #e0e0e0; --text-dim: #555; --text-mid: #888;
    --accent: #c8b8a2; --today: #2a2520; --today-border: #4a3f35;
    --green: #4caf7d; --red: #e05c5c; --blue: #5b8dee;
    --font-display: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 12px 48px; }
  .app { width: 100%; max-width: 460px; }

  /* ── LOGIN ── */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 24px; text-align: center; }
  .login-title { font-family: var(--font-display); font-size: 38px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
  .login-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
  .google-btn { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border2); color: var(--text); border-radius: 12px; padding: 12px 24px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; transition: border-color 0.15s, background 0.15s; letter-spacing: 0.05em; }
  .google-btn:hover { border-color: var(--text-mid); background: var(--surface2); }
  .google-icon { width: 18px; height: 18px; }

  /* ── CALENDAR ── */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header-center { text-align: center; }
  .month-name { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
  .year-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.25em; margin-top: 2px; }
  .nav-btn { background: none; border: 1px solid var(--border2); color: var(--text-mid); width: 40px; height: 40px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s; }
  .nav-btn:hover { border-color: var(--text-mid); color: var(--text); }
  .signout-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: color 0.15s; }
  .signout-btn:hover { color: var(--text-mid); }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 6px; }
  .day-header-cell { text-align: center; font-size: 9px; color: var(--text-dim); letter-spacing: 0.15em; padding: 4px 0; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-cell { aspect-ratio: 1; border-radius: 9px; position: relative; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
  .cal-cell.active { background: var(--surface); border: 1px solid var(--border); cursor: pointer; }
  .cal-cell.active:hover { background: var(--surface2); border-color: var(--border2); }
  .cal-cell.today { background: var(--today); border: 1px solid var(--today-border) !important; }
  .day-num { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; color: #aaa; line-height: 1; position: absolute; top: 22%; left: 50%; transform: translateX(-50%); }
  .cal-cell.today .day-num { color: var(--accent); }
  .entry-dot { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: var(--text-mid); }
  .pnl-label { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 600; letter-spacing: 0.01em; line-height: 1; white-space: nowrap; }
  .pnl-label.pos { color: var(--green); }
  .pnl-label.neg { color: var(--red); }

  /* ── SUMMARY ── */
  .summary-toggle-btn { background: none; border: 1px solid var(--border2); color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 8px 20px; border-radius: 10px; cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-top: 20px; width: 100%; }
  .summary-toggle-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .month-summary { margin-top: 12px; border-radius: 14px; border: 1px solid var(--border2); background: var(--surface); overflow: hidden; }
  .sum-row { display: grid; border-bottom: 1px solid var(--border2); }
  .sum-row.cols3 { grid-template-columns: 1fr 1px 1fr 1px 1fr; }
  .sum-row.cols2 { grid-template-columns: 1fr 1px 1fr; }
  .sum-row.no-border { border-bottom: none; }
  .sum-divider { background: var(--border2); }
  .sum-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 6px; }
  .sum-label { font-size: 8px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
  .sum-value { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.02em; line-height: 1; color: var(--text-mid); }
  .sum-value.pos { color: var(--green); }
  .sum-value.neg { color: var(--red); }
  .sum-value.lg { font-size: 14px; }
  .summary-bar-wrap { height: 3px; background: var(--border); overflow: hidden; }
  .summary-bar { height: 100%; transition: width 0.5s cubic-bezier(.22,1,.36,1), background 0.3s; }
  .pair-list-wrap { border-top: 1px solid var(--border2); padding: 10px 12px; max-height: 140px; overflow-y: auto; }
  .pair-list-title { font-size: 8px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .pair-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .pair-row:last-child { border-bottom: none; }
  .pair-name { font-size: 12px; color: var(--text); }
  .pair-stats { display: flex; gap: 10px; align-items: center; }
  .pair-count { font-size: 11px; color: var(--text-mid); }
  .pair-tp { font-size: 10px; color: var(--green); }
  .pair-sl { font-size: 10px; color: var(--red); }

  /* ── DAY OVERLAY ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: flex-end; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; width: 100%; max-width: 460px; padding: 20px; display: flex; flex-direction: column; gap: 14px; max-height: 82vh; overflow-y: auto; animation: slideUp 0.22s cubic-bezier(.22,1,.36,1); }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; line-height: 1; padding: 0 4px; }

  /* ── TRADE LIST ── */
  .trade-list { display: flex; flex-direction: column; gap: 8px; }
  .trade-card { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; transition: border-color 0.15s, background 0.12s; }
  .trade-card:hover { background: var(--surface2); border-color: var(--border2); }
  .trade-card-left { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .trade-card-pair { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .trade-card-meta { font-size: 10px; color: var(--text-dim); }
  .trade-card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .badge { font-size: 9px; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 5px; font-weight: 500; }
  .badge.long  { color: var(--green); background: rgba(76,175,125,0.12); }
  .badge.short { color: var(--red);   background: rgba(224,92,92,0.12); }
  .badge.tp    { color: var(--green); background: rgba(76,175,125,0.12); }
  .badge.sl    { color: var(--red);   background: rgba(224,92,92,0.12); }
  .badge.be    { color: var(--blue);  background: rgba(91,141,238,0.12); }
  .trade-dollar { font-size: 12px; font-weight: 500; }
  .trade-dollar.pos { color: var(--green); }
  .trade-dollar.neg { color: var(--red); }
  .trade-arrow { font-size: 14px; color: var(--text-dim); }

  .add-trade-day-btn { background: none; border: 1px dashed var(--border2); color: var(--text-dim); border-radius: 12px; padding: 12px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: border-color 0.15s, color 0.15s; width: 100%; }
  .add-trade-day-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }

  textarea { background: #111; border: 1px solid var(--border); border-radius: 12px; color: #ddd; font-size: 12px; font-family: 'Trebuchet MS', sans-serif; line-height: 1.8; padding: 14px; resize: none; outline: none; width: 100%; min-height: 80px; transition: border-color 0.15s; }
  textarea:focus { border-color: #3a3a3a; }
  textarea::placeholder { color: #333; font-style: italic; }
  .status-day { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-align: right; min-height: 14px; }

  /* ── TRADE DETAIL PAGE ── */
  .trade-page { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 150; overflow-y: auto; }
  .trade-page.open { display: block; animation: pageIn 0.25s cubic-bezier(.22,1,.36,1); }
  @keyframes pageIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .trade-page-inner { max-width: 460px; margin: 0 auto; padding: 24px 16px 48px; display: flex; flex-direction: column; gap: 20px; }
  .trade-page-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 4px; }
  .trade-page-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .trade-page-close { background: var(--surface); border: 1px solid var(--border2); color: var(--text-mid); width: 40px; height: 40px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
  .trade-page-close:hover { border-color: var(--text-mid); }

  .info-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; overflow: hidden; }
  .info-row { display: grid; border-bottom: 1px solid var(--border2); }
  .info-row.cols2 { grid-template-columns: 1fr 1px 1fr; }
  .info-row.cols3 { grid-template-columns: 1fr 1px 1fr 1px 1fr; }
  .info-row.no-border { border-bottom: none; }
  .info-divider { background: var(--border2); }
  .info-col { display: flex; flex-direction: column; gap: 4px; padding: 12px 14px; }
  .info-label { font-size: 8px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }
  .info-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
  .info-value.pos { color: var(--green); }
  .info-value.neg { color: var(--red); }
  .info-value.blue { color: var(--blue); }
  .info-value.mid { color: var(--text-mid); }

  .tp-section-title { font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }
  .tp-photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .tp-photo-wrap { position: relative; width: 80px; height: 80px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
  .tp-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tp-remove-photo { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.75); border: none; color: #ccc; font-size: 13px; width: 20px; height: 20px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .add-photo-label { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px dashed var(--border2); color: var(--text-dim); border-radius: 9px; padding: 8px 14px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .add-photo-label:hover { border-color: var(--text-mid); color: var(--text-mid); }
  .add-photo-label input { display: none; }

  .tp-note { background: #111; border: 1px solid var(--border); border-radius: 12px; color: #ddd; font-size: 12px; font-family: 'Trebuchet MS', sans-serif; line-height: 1.8; padding: 14px; resize: none; outline: none; width: 100%; min-height: 100px; transition: border-color 0.15s; }
  .tp-note:focus { border-color: #3a3a3a; }
  .tp-note::placeholder { color: #333; font-style: italic; }
  .status-trade { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-align: right; min-height: 14px; }

  /* edit + delete buttons */
  .trade-action-btns { display: flex; gap: 8px; }
  .edit-trade-btn { flex: 1; background: none; border: 1px solid var(--border2); color: var(--text-mid); border-radius: 10px; padding: 10px; font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: border-color 0.15s, color 0.15s; }
  .edit-trade-btn:hover { border-color: var(--text); color: var(--text); }
  .delete-trade-btn { flex: 1; background: none; border: 1px solid #3a1a1a; color: #7a3535; border-radius: 10px; padding: 10px; font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: border-color 0.15s, color 0.15s; }
  .delete-trade-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── TRADE FORM ── */
  .trade-form { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .trade-form-row { display: flex; gap: 6px; }
  .trade-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 12px; font-family: 'DM Mono', monospace; padding: 9px 10px; outline: none; width: 100%; transition: border-color 0.15s; }
  .trade-input:focus { border-color: var(--text-mid); }
  .trade-input::placeholder { color: var(--text-dim); }
  .toggle-btn { flex: 1; background: none; border: 1px solid var(--border2); color: var(--text-dim); border-radius: 8px; padding: 9px 6px; font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .toggle-btn.long.active  { border-color: #2a4a35; color: var(--green); background: rgba(76,175,125,0.08); }
  .toggle-btn.short.active { border-color: #4a2a2a; color: var(--red);   background: rgba(224,92,92,0.08); }
  .toggle-btn.tp.active    { border-color: #2a4a35; color: var(--green); background: rgba(76,175,125,0.08); }
  .toggle-btn.sl.active    { border-color: #4a2a2a; color: var(--red);   background: rgba(224,92,92,0.08); }
  .toggle-btn.be.active    { border-color: #1e2e4a; color: var(--blue);  background: rgba(91,141,238,0.08); }
  .save-trade-btn { background: none; border: 1px solid var(--border2); color: var(--text-mid); border-radius: 8px; padding: 10px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.08em; transition: border-color 0.15s, color 0.15s; width: 100%; }
  .save-trade-btn:hover { border-color: var(--text); color: var(--text); }

  /* edit form on trade page */
  .trade-edit-form { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  /* ── VIEWER ── */
  .viewer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; align-items: center; justify-content: center; }
  .viewer-overlay.open { display: flex; }
  .viewer-img { max-width: 100vw; max-height: 100vh; object-fit: contain; }
  .viewer-close { position: fixed; top: 16px; right: 16px; background: #000; border: none; color: #fff; font-size: 20px; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .viewer-download { position: fixed; top: 16px; left: 16px; background: #000; border: none; color: #fff; font-size: 18px; width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- LOGIN -->
  <div id="loginScreen" style="display:none">
    <div class="login-screen">
      <div>
        <div class="login-title">Takvim</div>
        <div class="login-sub" style="margin-top:8px">kişisel not &amp; fotoğraf takvimi</div>
      </div>
      <button class="google-btn" id="googleSignInBtn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google ile giriş yap
      </button>
      <div id="loginError" style="font-size:11px;color:#e05c5c;display:none;"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="calendarScreen" style="display:none">
    <div class="header">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="header-center">
        <div class="month-name" id="monthName"></div>
        <div class="year-label" id="yearLabel"></div>
      </div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div style="text-align:right;margin-bottom:16px;margin-top:-12px;">
      <button class="signout-btn" id="signOutBtn">çıkış yap</button>
    </div>
    <div class="day-headers" id="dayHeaders"></div>
    <div class="calendar-grid" id="calGrid"></div>

    <button class="summary-toggle-btn" id="summaryToggleBtn">ay özeti göster</button>
    <div class="month-summary" id="monthSummary" style="display:none">
      <div class="sum-row cols3">
        <div class="sum-col"><span class="sum-label">Kâr</span><span class="sum-value pos lg" id="sumProfit">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Net</span><span class="sum-value lg" id="sumNet">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Zarar</span><span class="sum-value neg lg" id="sumLoss">—</span></div>
      </div>
      <div class="summary-bar-wrap"><div class="summary-bar" id="summaryBar" style="width:0%"></div></div>
      <div class="sum-row cols3">
        <div class="sum-col"><span class="sum-label">İşlem</span><span class="sum-value" id="statTotal">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Win%</span><span class="sum-value" id="statWinRate">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Ort RR</span><span class="sum-value" id="statAvgRR">—</span></div>
      </div>
      <div class="sum-row cols2">
        <div class="sum-col">
          <span class="sum-label">Long</span>
          <span class="sum-value pos" id="statLong">—</span>
          <span class="sum-label" id="statLongDetail"></span>
        </div>
        <div class="sum-divider"></div>
        <div class="sum-col">
          <span class="sum-label">Short</span>
          <span class="sum-value neg" id="statShort">—</span>
          <span class="sum-label" id="statShortDetail"></span>
        </div>
      </div>
      <div class="sum-row cols2 no-border">
        <div class="sum-col"><span class="sum-label">Kârlı Ort.</span><span class="sum-value pos" id="statAvgWin">—</span></div>
        <div class="sum-divider"></div>
        <div class="sum-col"><span class="sum-label">Zararlı Ort.</span><span class="sum-value neg" id="statAvgLoss">—</span></div>
      </div>
      <div class="pair-list-wrap" id="pairListWrap" style="display:none">
        <div class="pair-list-title">Pair Dağılımı</div>
        <div id="pairList"></div>
      </div>
    </div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" id="closeDayBtn">×</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXIDM95RlrYzLcrsoRhIU6M99O35uOkN8",
  authDomain: "trade-takvimi.firebaseapp.com",
  projectId: "trade-takvimi",
  storageBucket: "trade-takvimi.firebasestorage.app",
  messagingSenderId: "277386285934",
  appId: "1:277386285934:web:71721232cac09f3764677f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const DAYS = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];

const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();
let selectedDay = null;
let currentUser = null;
let dotCache = {};

// new trade form state
let tradeDir = "long";
let tradeResult = null;

// edit form state
let editDir = "long";
let editResult = null;

// currently open trade
let openTradeDay = null;
let openTradeIdx = null;
let isEditMode = false;

let dayNoteTimer = null;
let tradeNoteTimer = null;

// ── UTILS ──
function showScreen(name) {
  document.getElementById("loginScreen").style.display = name === "login" ? "block" : "none";
  document.getElementById("calendarScreen").style.display = name === "calendar" ? "block" : "none";
}
function setStatusDay(msg) { document.getElementById("statusDay").textContent = msg; }
function setStatusTrade(msg) { document.getElementById("statusTrade").textContent = msg; }

// ── AUTH ──
onAuthStateChanged(auth, (user) => {
  if (user) { currentUser = user; dotCache = {}; showScreen("calendar"); render(); }
  else { currentUser = null; showScreen("login"); }
});
document.getElementById("googleSignInBtn").addEventListener("click", async () => {
  const e = document.getElementById("loginError"); e.style.display = "none";
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(err) { e.textContent = "Giriş başarısız: " + err.message; e.style.display = "block"; }
});
document.getElementById("signOutBtn").addEventListener("click", () => signOut(auth));

// ── FIRESTORE ──
function entryRef(y, m, d) { return doc(db, "users", currentUser.uid, "entries", `${y}_${m}_${d}`); }

async function loadEntry(y, m, d) {
  try {
    const snap = await getDoc(entryRef(y, m, d));
    const data = snap.exists() ? snap.data() : {};
    return {
      note: data.note || "",
      pnl: data.pnl || "",
      trades: (data.trades || []).map(t => ({
        id: t.id || Date.now(),
        pair: (t.pair || "").toUpperCase(),
        dir: t.dir || "long",
        result: t.result || null,
        tf: t.tf || "",
        rr: t.rr || "",
        dollar: t.dollar || "",
        note: t.note || "",
        photos: t.photos || []
      }))
    };
  } catch(e) { console.error(e); return { note: "", pnl: "", trades: [] }; }
}

async function saveEntry(y, m, d, data) {
  try {
    await setDoc(entryRef(y, m, d), data);
    dotCache[`${y}_${m}_${d}`] = data.note.trim() !== "" || data.pnl !== "" || data.trades.length > 0;
  } catch(e) { console.error(e); }
}

async function checkDot(y, m, d) {
  const key = `${y}_${m}_${d}`;
  if (dotCache[key] !== undefined) return dotCache[key];
  const e = await loadEntry(y, m, d);
  dotCache[key] = e.note.trim() !== "" || e.pnl !== "" || e.trades.length > 0;
  return dotCache[key];
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function firstDay(y, m) { let d = new Date(y,m,1).getDay(); return d===0?6:d-1; }

// ── CALENDAR ──
async function render() {
  document.getElementById("monthName").textContent = MONTHS[curMonth];
  document.getElementById("yearLabel").textContent = curYear;
  document.getElementById("dayHeaders").innerHTML = DAYS.map(d=>`<div class="day-header-cell">${d}</div>`).join("");
  document.getElementById("monthSummary").style.display = "none";
  document.getElementById("summaryToggleBtn").textContent = "ay özeti göster";

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  const days = daysInMonth(curYear, curMonth);
  const first = firstDay(curYear, curMonth);
  const cells = Math.ceil((first + days) / 7) * 7;

  for (let i = 0; i < cells; i++) {
    const day = i - first + 1;
    const cell = document.createElement("div"); cell.className = "cal-cell";
    if (day >= 1 && day <= days) {
      cell.classList.add("active");
      if (day===today.getDate() && curMonth===today.getMonth() && curYear===today.getFullYear()) cell.classList.add("today");
      const num = document.createElement("span"); num.className = "day-num"; num.textContent = day; cell.appendChild(num);
      const dot = document.createElement("span"); dot.className = "entry-dot"; dot.style.visibility = "hidden"; cell.appendChild(dot);
      const pnlEl = document.createElement("span"); pnlEl.className = "pnl-label"; pnlEl.style.visibility = "hidden"; cell.appendChild(pnlEl);
      checkDot(curYear, curMonth, day).then(has => { if (has) dot.style.visibility = "visible"; });
      loadEntry(curYear, curMonth, day).then(entry => {
        // Sum dollar amounts from trades
        let total = 0;
        let hasTrades = false;
        (entry.trades || []).forEach(t => {
          if (!t.result || t.result === "be") return;
          const d = parseFloat(t.dollar);
          if (!isNaN(d) && d > 0) {
            hasTrades = true;
            if (t.result === "tp") total += d;
            else total -= d;
          }
        });
        if (hasTrades) {
          pnlEl.textContent = (total >= 0 ? "+" : "") + total.toFixed(0) + "$";
          pnlEl.className = "pnl-label " + (total >= 0 ? "pos" : "neg");
          pnlEl.style.visibility = "visible";
          dot.style.visibility = "hidden";
        } else if (entry.pnl && entry.pnl !== "") {
          const val = parseFloat(entry.pnl);
          if (!isNaN(val)) {
            pnlEl.textContent = (val >= 0 ? "+" : "") + val + "$";
            pnlEl.className = "pnl-label " + (val >= 0 ? "pos" : "neg");
            pnlEl.style.visibility = "visible";
            dot.style.visibility = "hidden";
          }
        }
      });
      cell.addEventListener("click", () => openDayModal(day));
    }
    grid.appendChild(cell);
  }
}

// ── SUMMARY ──
document.getElementById("summaryToggleBtn").addEventListener("click", async () => {
  const el = document.getElementById("monthSummary");
  const btn = document.getElementById("summaryToggleBtn");
  if (el.style.display !== "none") { el.style.display = "none"; btn.textContent = "ay özeti göster"; }
  else { btn.textContent = "yükleniyor..."; await updateMonthlySummary(curYear, curMonth); btn.textContent = "ay özetini gizle"; }
});

async function updateMonthlySummary(y, m) {
  const days = daysInMonth(y, m);
  const entries = await Promise.all(Array.from({length: days}, (_, i) => loadEntry(y, m, i+1)));

  let totalProfit = 0, totalLoss = 0;
  let allTrades = [], winCount = 0;
  let longTotal = 0, longTP = 0, longSL = 0;
  let shortTotal = 0, shortTP = 0, shortSL = 0;
  let rrValues = [], dollarWins = [], dollarLosses = [];

  entries.forEach(e => {
    if (e.pnl && e.pnl !== "") {
      const v = parseFloat(e.pnl);
      if (!isNaN(v)) { if (v > 0) totalProfit += v; else totalLoss += v; }
    }
    (e.trades || []).forEach(t => {
      if (!t.result) return;
      allTrades.push(t);
      const isTP = t.result === "tp";
      const isBE = t.result === "be";
      // BE does not count for win/loss
      if (!isBE) {
        if (t.dir === "long") { longTotal++; if (isTP) longTP++; else longSL++; }
        else { shortTotal++; if (isTP) shortTP++; else shortSL++; }
        if (isTP) winCount++;
        const rr = parseFloat(t.rr);
        if (!isNaN(rr)) rrValues.push(isTP ? rr : -rr);
        const dollar = parseFloat(t.dollar);
        if (!isNaN(dollar) && dollar > 0) { if (isTP) dollarWins.push(dollar); else dollarLosses.push(dollar); }
      }
    });
  });

  const net = totalProfit + totalLoss;
  const hasData = totalProfit !== 0 || totalLoss !== 0 || allTrades.length > 0;
  const summaryEl = document.getElementById("monthSummary");
  if (!hasData) { summaryEl.style.display = "none"; document.getElementById("summaryToggleBtn").textContent = "ay özeti göster"; return; }

  summaryEl.style.display = "block";
  summaryEl.style.animation = "none"; summaryEl.offsetHeight; summaryEl.style.animation = "fadeIn 0.3s ease";

  document.getElementById("sumProfit").textContent = totalProfit > 0 ? `+${totalProfit.toFixed(0)}$` : "—";
  document.getElementById("sumLoss").textContent = totalLoss < 0 ? `${totalLoss.toFixed(0)}$` : "—";
  const netEl = document.getElementById("sumNet");
  netEl.textContent = (net >= 0 ? "+" : "") + net.toFixed(0) + "$";
  netEl.className = "sum-value lg " + (net > 0 ? "pos" : net < 0 ? "neg" : "");
  const absLoss = Math.abs(totalLoss);
  const ratio = totalProfit + absLoss > 0 ? (totalProfit / (totalProfit + absLoss)) * 100 : 50;
  document.getElementById("summaryBar").style.width = ratio + "%";
  document.getElementById("summaryBar").style.background = net >= 0 ? "var(--green)" : "var(--red)";

  // only count non-BE trades for stats
  const ratedTrades = allTrades.filter(t => t.result !== "be");
  const total = ratedTrades.length;
  const winRate = total > 0 ? Math.round((winCount / total) * 100) : null;
  const avgRR = rrValues.length > 0 ? rrValues.reduce((a,b)=>a+b,0)/rrValues.length : null;

  document.getElementById("statTotal").textContent = allTrades.length > 0 ? allTrades.length : "—";
  const wrEl = document.getElementById("statWinRate");
  wrEl.textContent = winRate !== null ? winRate + "%" : "—";
  wrEl.className = "sum-value" + (winRate !== null ? (winRate >= 50 ? " pos" : " neg") : "");
  const rrEl = document.getElementById("statAvgRR");
  rrEl.textContent = avgRR !== null ? (avgRR >= 0 ? "+" : "") + avgRR.toFixed(2) + "R" : "—";
  rrEl.className = "sum-value" + (avgRR !== null ? (avgRR >= 0 ? " pos" : " neg") : "");

  document.getElementById("statLong").textContent = longTotal > 0 ? longTotal : "—";
  document.getElementById("statLongDetail").textContent = longTotal > 0 ? `${longTP} TP / ${longSL} SL` : "";
  document.getElementById("statShort").textContent = shortTotal > 0 ? shortTotal : "—";
  document.getElementById("statShortDetail").textContent = shortTotal > 0 ? `${shortTP} TP / ${shortSL} SL` : "";

  const avgWin = dollarWins.length > 0 ? dollarWins.reduce((a,b)=>a+b,0)/dollarWins.length : null;
  const avgLoss2 = dollarLosses.length > 0 ? dollarLosses.reduce((a,b)=>a+b,0)/dollarLosses.length : null;
  document.getElementById("statAvgWin").textContent = avgWin !== null ? "+" + avgWin.toFixed(0) + "$" : "—";
  document.getElementById("statAvgLoss").textContent = avgLoss2 !== null ? "-" + avgLoss2.toFixed(0) + "$" : "—";

  const pairMap = {};
  allTrades.forEach(t => {
    const p = (t.pair || "?").toUpperCase();
    if (!pairMap[p]) pairMap[p] = { total: 0, tp: 0, sl: 0, be: 0 };
    pairMap[p].total++;
    if (t.result === "tp") pairMap[p].tp++;
    else if (t.result === "sl") pairMap[p].sl++;
    else if (t.result === "be") pairMap[p].be++;
  });
  const pairs = Object.entries(pairMap).sort((a,b) => b[1].total - a[1].total);
  const pairListWrap = document.getElementById("pairListWrap");
  const pairList = document.getElementById("pairList");
  if (pairs.length > 0) {
    pairListWrap.style.display = "block"; pairList.innerHTML = "";
    pairs.forEach(([pair, data]) => {
      const row = document.createElement("div"); row.className = "pair-row";
      let detail = `<span class="pair-tp">TP ${data.tp}</span><span class="pair-sl">SL ${data.sl}</span>`;
      if (data.be > 0) detail += `<span style="font-size:10px;color:var(--blue)">BE ${data.be}</span>`;
      row.innerHTML = `<span class="pair-name">${pair}</span><div class="pair-stats"><span class="pair-count">${data.total} işlem</span>${detail}</div>`;
      pairList.appendChild(row);
    });
  } else { pairListWrap.style.display = "none"; }
}

// ── DAY MODAL ──
async function openDayModal(day) {
  selectedDay = day;
  document.getElementById("modalTitle").textContent = `${day} ${MONTHS[curMonth]} ${curYear}`;
  document.getElementById("dayTradeList").innerHTML = "";
  document.getElementById("dayNoteArea").value = "";
  document.getElementById("addTradeFormWrap").style.display = "none";
  document.getElementById("showAddTradeBtn").textContent = "+ Trade ekle";
  resetNewTradeForm();
  setStatusDay("yükleniyor...");
  document.getElementById("overlay").classList.add("open");
  const entry = await loadEntry(curYear, curMonth, day);
  document.getElementById("dayNoteArea").value = entry.note || "";
  renderDayTrades(entry.trades || []);
  setStatusDay("");
}

function closeDayModal() {
  document.getElementById("overlay").classList.remove("open");
  selectedDay = null;
  render();
}

document.getElementById("closeDayBtn").addEventListener("click", closeDayModal);
document.getElementById("overlay").addEventListener("click", (e) => { if (e.target === document.getElementById("overlay")) closeDayModal(); });

function renderDayTrades(trades) {
  const list = document.getElementById("dayTradeList"); list.innerHTML = "";
  if (!trades || trades.length === 0) return;
  trades.forEach((t, idx) => {
    const card = document.createElement("div"); card.className = "trade-card";
    const left = document.createElement("div"); left.className = "trade-card-left";
    const pairEl = document.createElement("span"); pairEl.className = "trade-card-pair"; pairEl.textContent = t.pair || "—";
    left.appendChild(pairEl);
    const metaParts = [];
    if (t.tf) metaParts.push(t.tf);
    if (t.rr) metaParts.push("RR " + t.rr);
    if (metaParts.length) {
      const meta = document.createElement("span"); meta.className = "trade-card-meta"; meta.textContent = metaParts.join("  ·  ");
      left.appendChild(meta);
    }
    const right = document.createElement("div"); right.className = "trade-card-right";
    if (t.dollar && t.result !== "be") {
      const isWin = t.result === "tp";
      const dEl = document.createElement("span"); dEl.className = "trade-dollar " + (isWin ? "pos" : "neg");
      dEl.textContent = (isWin ? "+" : "-") + t.dollar + "$"; right.appendChild(dEl);
    }
    if (t.dir) { const b = document.createElement("span"); b.className = "badge " + t.dir; b.textContent = t.dir === "long" ? "LONG" : "SHORT"; right.appendChild(b); }
    if (t.result) { const b = document.createElement("span"); b.className = "badge " + t.result; b.textContent = t.result === "tp" ? "TP" : t.result === "sl" ? "SL" : "BE"; right.appendChild(b); }
    const arrow = document.createElement("span"); arrow.className = "trade-arrow"; arrow.textContent = "›"; right.appendChild(arrow);
    card.appendChild(left); card.appendChild(right);
    card.addEventListener("click", () => openTradePage(curYear, curMonth, selectedDay, idx));
    list.appendChild(card);
  });
}

// ── NEW TRADE FORM ──
document.getElementById("showAddTradeBtn").addEventListener("click", () => {
  const wrap = document.getElementById("addTradeFormWrap");
  const btn = document.getElementById("showAddTradeBtn");
  const isOpen = wrap.style.display !== "none";
  wrap.style.display = isOpen ? "none" : "block";
  btn.textContent = isOpen ? "+ Trade ekle" : "İptal";
  if (!isOpen) resetNewTradeForm();
});

function resetNewTradeForm() {
  document.getElementById("tPair").value = "";
  document.getElementById("tTF").value = "";
  document.getElementById("tRR").value = "";
  document.getElementById("tDollar").value = "";
  tradeDir = "long"; tradeResult = null;
  document.getElementById("tLongBtn").classList.add("active");
  document.getElementById("tShortBtn").classList.remove("active");
  document.getElementById("tTPBtn").classList.remove("active");
  document.getElementById("tSLBtn").classList.remove("active");
  document.getElementById("tBEBtn").classList.remove("active");
}

function setToggle(dirBtns, resBtns, dir, res) {
  dirBtns.forEach(([id, val]) => document.getElementById(id).classList.toggle("active", val === dir));
  resBtns.forEach(([id, val]) => document.getElementById(id).classList.toggle("active", val === res));
}

// new trade toggles
document.getElementById("tLongBtn").addEventListener("click", () => { tradeDir = "long"; setToggle([["tLongBtn","long"],["tShortBtn","short"]], [], tradeDir, null); document.getElementById("tTPBtn").classList.toggle("active", tradeResult==="tp"); document.getElementById("tSLBtn").classList.toggle("active", tradeResult==="sl"); document.getElementById("tBEBtn").classList.toggle("active", tradeResult==="be"); });
document.getElementById("tShortBtn").addEventListener("click", () => { tradeDir = "short"; document.getElementById("tLongBtn").classList.remove("active"); document.getElementById("tShortBtn").classList.add("active"); });
document.getElementById("tTPBtn").addEventListener("click", () => {
  tradeResult = tradeResult === "tp" ? null : "tp";
  document.getElementById("tTPBtn").classList.toggle("active", tradeResult === "tp");
  document.getElementById("tSLBtn").classList.remove("active");
  document.getElementById("tBEBtn").classList.remove("active");
});
document.getElementById("tSLBtn").addEventListener("click", () => {
  tradeResult = tradeResult === "sl" ? null : "sl";
  document.getElementById("tSLBtn").classList.toggle("active", tradeResult === "sl");
  document.getElementById("tTPBtn").classList.remove("active");
  document.getElementById("tBEBtn").classList.remove("active");
});
document.getElementById("tBEBtn").addEventListener("click", () => {
  tradeResult = tradeResult === "be" ? null : "be";
  document.getElementById("tBEBtn").classList.toggle("active", tradeResult === "be");
  document.getElementById("tTPBtn").classList.remove("active");
  document.getElementById("tSLBtn").classList.remove("active");
});

document.getElementById("saveNewTradeBtn").addEventListener("click", async () => {
  if (!selectedDay) return;
  const pair = document.getElementById("tPair").value.trim().toUpperCase();
  if (!pair) { setStatusDay("Pair gir!"); setTimeout(()=>setStatusDay(""), 1500); return; }
  if (!tradeResult) { setStatusDay("TP / SL / BE seç!"); setTimeout(()=>setStatusDay(""), 1500); return; }
  const trade = {
    id: Date.now(), pair, dir: tradeDir, result: tradeResult,
    tf: document.getElementById("tTF").value.trim(),
    rr: document.getElementById("tRR").value.trim(),
    dollar: document.getElementById("tDollar").value.replace(/[^0-9.]/g, ""),
    note: "", photos: []
  };
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.trades.push(trade);
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderDayTrades(entry.trades);
  document.getElementById("addTradeFormWrap").style.display = "none";
  document.getElementById("showAddTradeBtn").textContent = "+ Trade ekle";
  resetNewTradeForm();
  setStatusDay("trade eklendi ✓"); setTimeout(()=>setStatusDay(""), 1500);
});

// ── DAY NOTE ──
document.getElementById("dayNoteArea").addEventListener("input", (e) => {
  if (!selectedDay) return;
  clearTimeout(dayNoteTimer); setStatusDay("kaydediliyor...");
  dayNoteTimer = setTimeout(async () => {
    const entry = await loadEntry(curYear, curMonth, selectedDay);
    entry.note = e.target.value;
    await saveEntry(curYear, curMonth, selectedDay, entry);
    setStatusDay("kaydedildi ✓"); setTimeout(()=>setStatusDay(""), 2000);
  }, 800);
});

// ── TRADE PAGE ──
async function openTradePage(y, m, d, idx) {
  openTradeDay = { y, m, d };
  openTradeIdx = idx;
  isEditMode = false;
  document.getElementById("tradeEditForm").style.display = "none";
  document.getElementById("tradeInfoCard").style.display = "block";
  document.getElementById("editTradeBtn").textContent = "Düzenle";

  const entry = await loadEntry(y, m, d);
  const t = entry.trades[idx];
  if (!t) return;

  fillTradePageInfo(t);
  document.getElementById("tpNoteArea").value = t.note || "";
  renderTradePhotos(t.photos || []);
  document.getElementById("tradePage").classList.add("open");
}

function fillTradePageInfo(t) {
  document.getElementById("tradePageTitle").textContent = `${t.pair} — ${openTradeDay.d} ${MONTHS[openTradeDay.m]}`;

  const dirEl = document.getElementById("tpDir");
  dirEl.textContent = t.dir === "long" ? "LONG" : "SHORT";
  dirEl.className = "info-value " + (t.dir === "long" ? "pos" : "neg");

  const resEl = document.getElementById("tpResult");
  if (t.result === "tp") { resEl.textContent = "TP ✓"; resEl.className = "info-value pos"; }
  else if (t.result === "sl") { resEl.textContent = "SL ✗"; resEl.className = "info-value neg"; }
  else if (t.result === "be") { resEl.textContent = "BE"; resEl.className = "info-value blue"; }
  else { resEl.textContent = "—"; resEl.className = "info-value mid"; }

  document.getElementById("tpTF").textContent = t.tf || "—";

  const rrEl = document.getElementById("tpRR");
  if (t.rr && t.result !== "be") {
    const isWin = t.result === "tp";
    rrEl.textContent = (isWin ? "+" : "-") + t.rr + "R";
    rrEl.className = "info-value " + (isWin ? "pos" : "neg");
  } else { rrEl.textContent = t.result === "be" ? "—" : "—"; rrEl.className = "info-value mid"; }

  const dolEl = document.getElementById("tpDollar");
  if (t.dollar && t.result !== "be") {
    const isWin = t.result === "tp";
    dolEl.textContent = (isWin ? "+" : "-") + t.dollar + "$";
    dolEl.className = "info-value " + (isWin ? "pos" : "neg");
  } else { dolEl.textContent = "—"; dolEl.className = "info-value mid"; }
}

function closeTradePageFn() {
  document.getElementById("tradePage").classList.remove("open");
  if (selectedDay) {
    loadEntry(curYear, curMonth, selectedDay).then(entry => renderDayTrades(entry.trades || []));
  }
  openTradeDay = null; openTradeIdx = null; isEditMode = false;
}
document.getElementById("closeTradePageBtn").addEventListener("click", closeTradePageFn);

// ── EDIT TRADE ──
document.getElementById("editTradeBtn").addEventListener("click", async () => {
  if (!openTradeDay || openTradeIdx === null) return;
  if (isEditMode) {
    // cancel edit
    isEditMode = false;
    document.getElementById("tradeEditForm").style.display = "none";
    document.getElementById("tradeInfoCard").style.display = "block";
    document.getElementById("editTradeBtn").textContent = "Düzenle";
    return;
  }
  // open edit
  isEditMode = true;
  document.getElementById("editTradeBtn").textContent = "İptal";
  document.getElementById("tradeInfoCard").style.display = "none";
  document.getElementById("tradeEditForm").style.display = "flex";
  document.getElementById("tradeEditForm").style.flexDirection = "column";

  const entry = await loadEntry(openTradeDay.y, openTradeDay.m, openTradeDay.d);
  const t = entry.trades[openTradeIdx];
  if (!t) return;

  // fill edit form
  document.getElementById("ePair").value = t.pair || "";
  document.getElementById("eTF").value = t.tf || "";
  document.getElementById("eRR").value = t.rr || "";
  document.getElementById("eDollar").value = t.dollar || "";
  editDir = t.dir || "long";
  editResult = t.result || null;

  document.getElementById("eLongBtn").classList.toggle("active", editDir === "long");
  document.getElementById("eShortBtn").classList.toggle("active", editDir === "short");
  document.getElementById("eTPBtn").classList.toggle("active", editResult === "tp");
  document.getElementById("eSLBtn").classList.toggle("active", editResult === "sl");
  document.getElementById("eBEBtn").classList.toggle("active", editResult === "be");
});

// edit form toggles
document.getElementById("eLongBtn").addEventListener("click", () => { editDir = "long"; document.getElementById("eLongBtn").classList.add("active"); document.getElementById("eShortBtn").classList.remove("active"); });
document.getElementById("eShortBtn").addEventListener("click", () => { editDir = "short"; document.getElementById("eShortBtn").classList.add("active"); document.getElementById("eLongBtn").classList.remove("active"); });
document.getElementById("eTPBtn").addEventListener("click", () => { editResult = editResult==="tp"?null:"tp"; document.getElementById("eTPBtn").classList.toggle("active",editResult==="tp"); document.getElementById("eSLBtn").classList.remove("active"); document.getElementById("eBEBtn").classList.remove("active"); });
document.getElementById("eSLBtn").addEventListener("click", () => { editResult = editResult==="sl"?null:"sl"; document.getElementById("eSLBtn").classList.toggle("active",editResult==="sl"); document.getElementById("eTPBtn").classList.remove("active"); document.getElementById("eBEBtn").classList.remove("active"); });
document.getElementById("eBEBtn").addEventListener("click", () => { editResult = editResult==="be"?null:"be"; document.getElementById("eBEBtn").classList.toggle("active",editResult==="be"); document.getElementById("eTPBtn").classList.remove("active"); document.getElementById("eSLBtn").classList.remove("active"); });

document.getElementById("saveEditTradeBtn").addEventListener("click", async () => {
  if (!openTradeDay || openTradeIdx === null) return;
  const pair = document.getElementById("ePair").value.trim().toUpperCase();
  if (!pair) { setStatusTrade("Pair gir!"); setTimeout(()=>setStatusTrade(""), 1500); return; }
  if (!editResult) { setStatusTrade("TP / SL / BE seç!"); setTimeout(()=>setStatusTrade(""), 1500); return; }

  const { y, m, d } = openTradeDay;
  const entry = await loadEntry(y, m, d);
  const t = entry.trades[openTradeIdx];
  t.pair = pair;
  t.dir = editDir;
  t.result = editResult;
  t.tf = document.getElementById("eTF").value.trim();
  t.rr = document.getElementById("eRR").value.trim();
  t.dollar = document.getElementById("eDollar").value.replace(/[^0-9.]/g, "");

  await saveEntry(y, m, d, entry);
  fillTradePageInfo(t);
  isEditMode = false;
  document.getElementById("tradeEditForm").style.display = "none";
  document.getElementById("tradeInfoCard").style.display = "block";
  document.getElementById("editTradeBtn").textContent = "Düzenle";
  setStatusTrade("kaydedildi ✓"); setTimeout(()=>setStatusTrade(""), 2000);
});

// ── TRADE NOTE ──
document.getElementById("tpNoteArea").addEventListener("input", (e) => {
  if (!openTradeDay || openTradeIdx === null) return;
  clearTimeout(tradeNoteTimer); setStatusTrade("kaydediliyor...");
  tradeNoteTimer = setTimeout(async () => {
    const { y, m, d } = openTradeDay;
    const entry = await loadEntry(y, m, d);
    if (entry.trades[openTradeIdx]) {
      entry.trades[openTradeIdx].note = e.target.value;
      await saveEntry(y, m, d, entry);
      setStatusTrade("kaydedildi ✓"); setTimeout(()=>setStatusTrade(""), 2000);
    }
  }, 800);
});

// ── TRADE PHOTOS ──
function renderTradePhotos(photos) {
  const grid = document.getElementById("tpPhotoGrid"); grid.innerHTML = "";
  photos.forEach((src, pIdx) => {
    const wrap = document.createElement("div"); wrap.className = "tp-photo-wrap";
    const img = document.createElement("img"); img.src = src; img.addEventListener("click", () => openViewer(src));
    const btn = document.createElement("button"); btn.className = "tp-remove-photo"; btn.textContent = "×";
    btn.addEventListener("click", (e) => { e.stopPropagation(); removeTradePhoto(pIdx); });
    wrap.appendChild(img); wrap.appendChild(btn); grid.appendChild(wrap);
  });
}

async function removeTradePhoto(pIdx) {
  if (!openTradeDay || openTradeIdx === null) return;
  const { y, m, d } = openTradeDay;
  const entry = await loadEntry(y, m, d);
  entry.trades[openTradeIdx].photos.splice(pIdx, 1);
  await saveEntry(y, m, d, entry);
  renderTradePhotos(entry.trades[openTradeIdx].photos);
  setStatusTrade("silindi ✓"); setTimeout(()=>setStatusTrade(""), 1500);
}

function resizeImage(file, maxSize=1200) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = h*maxSize/w; w = maxSize; } else if (h > maxSize) { w = w*maxSize/h; h = maxSize; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/webp", 0.95));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById("tpFileInput").addEventListener("change", async (e) => {
  if (!openTradeDay || openTradeIdx === null) return;
  const files = Array.from(e.target.files); if (!files.length) return;
  setStatusTrade("fotoğraflar yükleniyor...");
  const { y, m, d } = openTradeDay;
  const entry = await loadEntry(y, m, d);
  for (const file of files) entry.trades[openTradeIdx].photos.push(await resizeImage(file));
  await saveEntry(y, m, d, entry);
  renderTradePhotos(entry.trades[openTradeIdx].photos);
  setStatusTrade("kaydedildi ✓"); setTimeout(()=>setStatusTrade(""), 2000); e.target.value = "";
});

// ── DELETE TRADE ──
document.getElementById("deleteTradeBtn").addEventListener("click", async () => {
  if (!openTradeDay || openTradeIdx === null) return;
  if (!confirm("Bu trade silinsin mi?")) return;
  const { y, m, d } = openTradeDay;
  const entry = await loadEntry(y, m, d);
  entry.trades.splice(openTradeIdx, 1);
  await saveEntry(y, m, d, entry);
  closeTradePageFn();
});

// ── VIEWER ──
function openViewer(src) { document.getElementById("viewerImg").src = src; document.getElementById("viewerDownload").href = src; document.getElementById("viewerOverlay").classList.add("open"); }
function closeViewer() { document.getElementById("viewerOverlay").classList.remove("open"); }
document.getElementById("viewerClose").addEventListener("click", closeViewer);
document.getElementById("viewerOverlay").addEventListener("click", (e) => { if (e.target===document.getElementById("viewerOverlay")) closeViewer(); });

// ── NAV ──
document.getElementById("prevBtn").addEventListener("click", () => { if(curMonth===0){curMonth=11;curYear--;}else curMonth--; render(); });
document.getElementById("nextBtn").addEventListener("click", () => { if(curMonth===11){curMonth=0;curYear++;}else curMonth++; render(); });
</script>
