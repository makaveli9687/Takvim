<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #222;
    --border2: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #555;
    --text-mid: #888;
    --accent: #c8b8a2;
    --today: #2a2520;
    --today-border: #4a3f35;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 12px 48px;
  }
  .app { width: 100%; max-width: 460px; }
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 24px;
    text-align: center;
  }
  .login-title {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .login-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
  .google-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    letter-spacing: 0.05em;
  }
  .google-btn:hover { border-color: var(--text-mid); background: var(--surface2); }
  .google-icon { width: 18px; height: 18px; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .header-center { text-align: center; }
  .month-name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .year-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.25em; margin-top: 4px; }
  .nav-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-mid);
    width: 40px; height: 40px;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover { border-color: var(--text-mid); color: var(--text); }
  .signout-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: color 0.15s;
  }
  .signout-btn:hover { color: var(--text-mid); }
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 6px;
  }
  .day-header-cell {
    text-align: center;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    padding: 4px 0;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 9px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.12s;
  }
  .cal-cell.active {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .cal-cell.active:hover { background: var(--surface2); border-color: var(--border2); }
  .cal-cell.today { background: var(--today); border: 1px solid var(--today-border) !important; }
  .day-num { font-size: 13px; color: #aaa; font-weight: 500; line-height: 1; }
  .cal-cell.today .day-num { color: var(--accent); }
  .entry-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-mid); }
  .pnl-label { font-size: 8px; font-weight: 600; letter-spacing: 0.02em; line-height: 1; }
  .pnl-label.pos { color: #4caf7d; }
  .pnl-label.neg { color: #e05c5c; }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px;
    width: 100%;
    max-width: 460px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.22s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .close-btn {
    background: none; border: none;
    color: var(--text-dim); font-size: 24px;
    cursor: pointer; line-height: 1; padding: 0 4px;
  }
  .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .photo-wrap {
    position: relative;
    width: 76px; height: 76px;
    border-radius: 9px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .remove-photo {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,0.75);
    border: none; color: #ccc;
    font-size: 13px; width: 20px; height: 20px;
    border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* FULLSCREEN VIEWER */
  .viewer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .viewer-overlay.open { display: flex; }
  .viewer-img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
  }
  .viewer-close {
    position: fixed;
    top: 16px; right: 16px;
    background: #000;
    border: none; color: #fff;
    font-size: 20px; width: 42px; height: 42px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .viewer-download {
    position: fixed;
    top: 16px; left: 16px;
    background: #000;
    border: none; color: #fff;
    font-size: 18px; width: 42px; height: 42px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .add-photo-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text-dim);
    border-radius: 9px;
    padding: 8px 14px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-photo-label:hover { border-color: var(--text-mid); color: var(--text-mid); }
  .add-photo-label input { display: none; }
  textarea {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: #ddd;
    font-size: 12px;
    font-family: 'Trebuchet MS', sans-serif;
    line-height: 1.8;
    padding: 16px;
    resize: none;
    outline: none;
    width: 100%;
    min-height: 140px;
    letter-spacing: 0.01em;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #3a3a3a; }
  textarea::placeholder { color: #333; font-style: italic; }
  .status { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-align: right; min-height: 16px; }
  .loading-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 80vh; color: var(--text-dim);
    font-size: 12px; letter-spacing: 0.15em;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="loading-screen" id="loadingScreen">yükleniyor...</div>

  <div id="loginScreen" style="display:none">
    <div class="login-screen">
      <div>
        <div class="login-title">Takvim</div>
        <div class="login-sub" style="margin-top:8px">kişisel not &amp; fotoğraf takvimi</div>
      </div>
      <button class="google-btn" id="googleSignInBtn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google ile giriş yap
      </button>
    </div>
  </div>

  <div id="calendarScreen" style="display:none">
    <div class="header">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="header-center">
        <div class="month-name" id="monthName"></div>
        <div class="year-label" id="yearLabel"></div>
      </div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div style="text-align:right; margin-bottom:16px; margin-top:-16px;">
      <button class="signout-btn" id="signOutBtn">çıkış yap</button>
    </div>
    <div class="day-headers" id="dayHeaders"></div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>
</div>

<!-- Fullscreen viewer -->
<div class="viewer-overlay" id="viewerOverlay">
  <button class="viewer-close" id="viewerClose">×</button>
  <a class="viewer-download" id="viewerDownload" download="foto.jpg">⬇</a>
  <img class="viewer-img" id="viewerImg" src="" alt="">
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" id="closeBtn">×</button>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
    <label class="add-photo-label">
      + Fotoğraf ekle
      <input type="file" id="fileInput" accept="image/*" multiple>
    </label>
    <textarea id="noteArea" placeholder="Bugün ne oldu? Notunu buraya yaz..."></textarea>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <input type="text" inputmode="decimal" id="pnlInput" placeholder="Tutar gir (örn: 250)"
        style="background:#111; border:1px solid #222; border-radius:10px; color:#ddd;
               font-size:15px; font-family:'DM Mono',monospace; padding:10px 14px;
               outline:none; width:100%; transition:border-color 0.15s;">
      <div style="display:flex; gap:8px;">
        <button id="karBtn" style="flex:1; background:none; border:1px solid #2a4a35; color:#4caf7d;
          border-radius:10px; padding:10px; font-size:13px; font-family:'DM Mono',monospace;
          cursor:pointer; letter-spacing:0.05em; transition:background 0.15s;">Kâr</button>
        <button id="zararBtn" style="flex:1; background:none; border:1px solid #4a2a2a; color:#e05c5c;
          border-radius:10px; padding:10px; font-size:13px; font-family:'DM Mono',monospace;
          cursor:pointer; letter-spacing:0.05em; transition:background 0.15s;">Zarar</button>
      </div>
    </div>
    <div class="status" id="statusMsg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXIDM95RlrYzLcrsoRhIU6M99O35uOkN8",
  authDomain: "trade-takvimi.firebaseapp.com",
  projectId: "trade-takvimi",
  storageBucket: "trade-takvimi.firebasestorage.app",
  messagingSenderId: "277386285934",
  appId: "1:277386285934:web:71721232cac09f3764677f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const DAYS = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];

const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();
let selectedDay = null;
let currentUser = null;
let saveTimer = null;
let dotCache = {};

function showScreen(name) {
  document.getElementById("loadingScreen").style.display = name === "loading" ? "flex" : "none";
  document.getElementById("loginScreen").style.display = name === "login" ? "block" : "none";
  document.getElementById("calendarScreen").style.display = name === "calendar" ? "block" : "none";
}

function setStatus(msg) { document.getElementById("statusMsg").textContent = msg; }

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    dotCache = {};
    showScreen("calendar");
    render();
  } else {
    currentUser = null;
    showScreen("login");
  }
});

document.getElementById("googleSignInBtn").addEventListener("click", async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { alert("Giriş başarısız: " + e.message); }
});

document.getElementById("signOutBtn").addEventListener("click", () => signOut(auth));

function entryRef(y, m, d) {
  return doc(db, "users", currentUser.uid, "entries", `${y}_${m}_${d}`);
}

async function loadEntry(y, m, d) {
  try {
    const snap = await getDoc(entryRef(y, m, d));
    return snap.exists() ? snap.data() : { note: "", photos: [], pnl: "" };
  } catch(e) {
    console.error(e);
    return { note: "", photos: [], pnl: "" };
  }
}

async function saveEntry(y, m, d, data) {
  try {
    await setDoc(entryRef(y, m, d), data);
    dotCache[`${y}_${m}_${d}`] = data.note.trim() !== "" || data.photos.length > 0 || data.pnl !== "";
  } catch(e) {
    console.error(e);
    setStatus("kaydetme hatası!");
  }
}

async function checkDot(y, m, d) {
  const key = `${y}_${m}_${d}`;
  if (dotCache[key] !== undefined) return dotCache[key];
  const e = await loadEntry(y, m, d);
  dotCache[key] = e.note.trim() !== "" || e.photos.length > 0 || (e.pnl && e.pnl !== "");
  return dotCache[key];
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function firstDay(y, m) { let d = new Date(y,m,1).getDay(); return d===0?6:d-1; }

async function render() {
  document.getElementById("monthName").textContent = MONTHS[curMonth];
  document.getElementById("yearLabel").textContent = curYear;
  document.getElementById("dayHeaders").innerHTML = DAYS.map(d=>`<div class="day-header-cell">${d}</div>`).join("");

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  const days = daysInMonth(curYear, curMonth);
  const first = firstDay(curYear, curMonth);
  const cells = Math.ceil((first + days) / 7) * 7;

  for (let i = 0; i < cells; i++) {
    const day = i - first + 1;
    const cell = document.createElement("div");
    cell.className = "cal-cell";

    if (day >= 1 && day <= days) {
      cell.classList.add("active");
      if (day===today.getDate() && curMonth===today.getMonth() && curYear===today.getFullYear())
        cell.classList.add("today");

      const num = document.createElement("span");
      num.className = "day-num";
      num.textContent = day;
      cell.appendChild(num);

      const dot = document.createElement("span");
      dot.className = "entry-dot";
      dot.style.visibility = "hidden";
      cell.appendChild(dot);

      const pnlEl = document.createElement("span");
      pnlEl.className = "pnl-label";
      pnlEl.style.visibility = "hidden";
      cell.appendChild(pnlEl);

      checkDot(curYear, curMonth, day).then(has => {
        if (has) dot.style.visibility = "visible";
      });
      loadEntry(curYear, curMonth, day).then(entry => {
        if (entry.pnl && entry.pnl !== "") {
          const val = parseFloat(entry.pnl);
          if (!isNaN(val)) {
            pnlEl.textContent = (val >= 0 ? "+" : "") + val + "$";
            pnlEl.classList.add(val >= 0 ? "pos" : "neg");
            pnlEl.style.visibility = "visible";
            dot.style.visibility = "hidden";
          }
        }
      });

      cell.addEventListener("click", () => openModal(day));
    }
    grid.appendChild(cell);
  }
}

async function openModal(day) {
  selectedDay = day;
  document.getElementById("modalTitle").textContent = `${day} ${MONTHS[curMonth]} ${curYear}`;
  document.getElementById("noteArea").value = "";
  document.getElementById("photoGrid").innerHTML = "";
  setStatus("yükleniyor...");
  document.getElementById("overlay").classList.add("open");

  const entry = await loadEntry(curYear, curMonth, day);
  document.getElementById("noteArea").value = entry.note || "";
  const pnlVal = entry.pnl || "";
  const pnlInput = document.getElementById("pnlInput");
  pnlInput.value = pnlVal;
  if (pnlVal.startsWith("+")) pnlInput.style.color = "#4caf7d";
  else if (pnlVal.startsWith("-")) pnlInput.style.color = "#e05c5c";
  else pnlInput.style.color = "#ddd";
  renderPhotos(entry.photos || []);
  setStatus("");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  selectedDay = null;
  render();
}

function openViewer(src) {
  document.getElementById("viewerImg").src = src;
  document.getElementById("viewerDownload").href = src;
  document.getElementById("viewerOverlay").classList.add("open");
}
function closeViewer() {
  document.getElementById("viewerOverlay").classList.remove("open");
}
document.getElementById("viewerClose").addEventListener("click", closeViewer);
document.getElementById("viewerOverlay").addEventListener("click", (e) => {
  if (e.target === document.getElementById("viewerOverlay")) closeViewer();
});

function renderPhotos(photos) {
  const grid = document.getElementById("photoGrid");
  grid.innerHTML = "";
  photos.forEach((data, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "photo-wrap";
    const img = document.createElement("img");
    img.src = data;
    img.addEventListener("click", () => openViewer(data));
    const btn = document.createElement("button");
    btn.className = "remove-photo";
    btn.textContent = "×";
    btn.addEventListener("click", (e) => { e.stopPropagation(); removePhoto(idx); });
    wrap.appendChild(img);
    wrap.appendChild(btn);
    grid.appendChild(wrap);
  });
}

async function removePhoto(idx) {
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.photos.splice(idx, 1);
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderPhotos(entry.photos);
  setStatus("silindi ✓");
  setTimeout(() => setStatus(""), 1500);
}

// Resize image before saving to keep Firestore doc small
function resizeImage(file, maxSize = 1200) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
        else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/webp", 0.95));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById("noteArea").addEventListener("input", (e) => {
  if (!selectedDay) return;
  clearTimeout(saveTimer);
  setStatus("kaydediliyor...");
  saveTimer = setTimeout(async () => {
    const entry = await loadEntry(curYear, curMonth, selectedDay);
    entry.note = e.target.value;
    await saveEntry(curYear, curMonth, selectedDay, entry);
    setStatus("kaydedildi ✓");
    setTimeout(() => setStatus(""), 2000);
  }, 800);
});

async function savePnl(value) {
  const entry = await loadEntry(curYear, curMonth, selectedDay);
  entry.pnl = value;
  await saveEntry(curYear, curMonth, selectedDay, entry);
  setStatus("kaydedildi ✓");
  setTimeout(() => setStatus(""), 2000);
  // Update input color
  const input = document.getElementById("pnlInput");
  if (value.startsWith("+")) input.style.color = "#4caf7d";
  else if (value.startsWith("-")) input.style.color = "#e05c5c";
  else input.style.color = "#ddd";
}

document.getElementById("karBtn").addEventListener("click", async () => {
  if (!selectedDay) return;
  const raw = document.getElementById("pnlInput").value.replace(/[^0-9.]/g, "");
  if (!raw) return;
  const val = "+" + raw;
  document.getElementById("pnlInput").value = val;
  document.getElementById("pnlInput").style.color = "#4caf7d";
  setStatus("kaydediliyor...");
  await savePnl(val);
});

document.getElementById("zararBtn").addEventListener("click", async () => {
  if (!selectedDay) return;
  const raw = document.getElementById("pnlInput").value.replace(/[^0-9.]/g, "");
  if (!raw) return;
  const val = "-" + raw;
  document.getElementById("pnlInput").value = val;
  document.getElementById("pnlInput").style.color = "#e05c5c";
  setStatus("kaydediliyor...");
  await savePnl(val);
});

document.getElementById("fileInput").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  setStatus("fotoğraflar yükleniyor...");

  const entry = await loadEntry(curYear, curMonth, selectedDay);
  for (const file of files) {
    const resized = await resizeImage(file);
    entry.photos.push(resized);
  }
  await saveEntry(curYear, curMonth, selectedDay, entry);
  renderPhotos(entry.photos);
  setStatus("kaydedildi ✓");
  setTimeout(() => setStatus(""), 2000);
  e.target.value = "";
});

document.getElementById("prevBtn").addEventListener("click", () => {
  if (curMonth===0){curMonth=11;curYear--;} else curMonth--;
  render();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  if (curMonth===11){curMonth=0;curYear++;} else curMonth++;
  render();
});
document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target===document.getElementById("overlay")) closeModal();
});
</script>
</body>
</html>
